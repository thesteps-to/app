<!-- @dsCard group="Components" viewport="700x440" name="Action card (signature)" subtitle="The single next-action surface — one screen, one clear move" -->
<!DOCTYPE html>
<html lang="fr"><head><meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 28px; background: var(--surface-app); display: flex; justify-content: center; }
</style></head>
<body>
  <article class="ts-action">
    <div class="ts-action__top">
      <div class="ts-action__step">
        <span class="ts-glyph" data-state="current"></span>
        <span class="eyebrow">Étape 4 / 9 · Achat immobilier</span>
      </div>
      <span class="ts-time ts-time--soon">J-12</span>
    </div>
    <h2 class="ts-action__title">Signer le compromis de vente</h2>
    <p class="ts-action__desc">J’ai préparé le compromis avec le notaire. Relisez-le tranquillement — il ne vous reste qu’à confirmer le rendez-vous.</p>
    <div class="ts-action__meta">
      <span class="ts-pay">💳 Estimation <b>~1 200 €</b></span>
      <span class="ts-tag">Notaire</span>
    </div>
    <div class="ts-action__cta">
      <div class="ts-action__cta-row">
        <button class="ts-btn ts-btn--primary ts-btn--lg ts-btn--block">C’est fait
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6L9 17l-5-5"/></svg>
        </button>
      </div>
      <a class="ts-action__detail" href="#">Voir le plan complet
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m9 18 6-6-6-6"/></svg>
      </a>
    </div>
    <div class="ts-action__provider">
      <span class="ts-avatar ts-avatar--sm">M</span>
      <span class="grow">Maître Lefèvre peut s’en charger — <a href="#" rel="sponsored">voir le profil</a></span>
      <span class="ts-sponsored">Suggéré</span>
    </div>
  </article>
</body></html>

<!-- @dsCard group="Components" viewport="700x150" name="Avatars & tooltip" subtitle="People, plan authors, verified providers · transition tooltip" -->
<!DOCTYPE html>
<html lang="fr"><head><meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 26px; background: var(--surface-card); display: flex; gap: 36px; align-items: center; flex-wrap: wrap; }
  .grp { display: flex; gap: 14px; align-items: center; }
  .lbl { font: var(--font-caption); font-size: 11px; color: var(--text-muted); }
</style></head>
<body>
  <div class="grp">
    <span class="ts-avatar ts-avatar--sm">CR</span>
    <span class="ts-avatar">CR</span>
    <span class="ts-avatar ts-avatar--lg ts-avatar--author">EL</span>
    <span class="ts-avatar-wrap"><span class="ts-avatar">ML</span><span class="ts-avatar-wrap__tick"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6L9 17l-5-5"/></svg></span></span>
  </div>
  <div class="grp">
    <span class="ts-avatar-group">
      <span class="ts-avatar ts-avatar--sm">A</span>
      <span class="ts-avatar ts-avatar--sm">B</span>
      <span class="ts-avatar ts-avatar--sm">C</span>
      <span class="ts-avatar ts-avatar--sm" style="background:var(--surface-sunken);color:var(--text-muted)">+5</span>
    </span>
    <span class="lbl">avis vérifiés</span>
  </div>
  <div class="ts-tooltip">
    <span class="ts-badge ts-badge--locked">Disponible après le compromis</span>
    <span class="ts-tooltip__bubble" style="opacity:1;transform:translateX(-50%)">Cette étape s’ouvrira dès la signature du compromis.</span>
  </div>
</body></html>

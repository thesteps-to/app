<!-- @dsCard group="Components" viewport="700x200" name="Buttons" subtitle="One primary per screen · primary / secondary / ghost / quiet / danger" -->
<!DOCTYPE html>
<html lang="fr"><head><meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 24px; background: var(--surface-card); display: flex; flex-direction: column; gap: 16px; }
  .row { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }
  .h { font: var(--label-caps); letter-spacing: var(--tracking-caps); text-transform: uppercase; color: var(--text-faint); width: 64px; }
</style></head>
<body>
  <div class="row">
    <span class="h">Variants</span>
    <button class="ts-btn ts-btn--primary">C’est fait
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6L9 17l-5-5"/></svg>
    </button>
    <button class="ts-btn ts-btn--secondary">Plus tard</button>
    <button class="ts-btn ts-btn--ghost">Voir le plan complet</button>
    <button class="ts-btn ts-btn--quiet">Annuler</button>
    <button class="ts-btn ts-btn--danger">Supprimer</button>
  </div>
  <div class="row">
    <span class="h">Sizes</span>
    <button class="ts-btn ts-btn--primary ts-btn--sm">Small</button>
    <button class="ts-btn ts-btn--primary">Medium</button>
    <button class="ts-btn ts-btn--primary ts-btn--lg">Large</button>
    <button class="ts-btn ts-btn--primary" disabled>Disabled</button>
  </div>
  <div class="row">
    <span class="h">Icon</span>
    <button class="ts-iconbtn" aria-label="Recherche"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg></button>
    <button class="ts-iconbtn" aria-label="Notifications"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10.3 21a1.94 1.94 0 0 0 3.4 0"/><path d="M21 16V8a2 2 0 0 0-1-1.7l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8l1 1h16Z"/></svg></button>
    <button class="ts-iconbtn" aria-label="Réglages"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-2.82 1.17V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 8 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.6 15H4.5a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 6 9.4l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 11 4.6V4.5a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 2.82 1.17l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 11h.1a2 2 0 0 1 0 4Z"/></svg></button>
  </div>
</body></html>

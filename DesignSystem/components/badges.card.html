<!-- @dsCard group="Components" viewport="700x180" name="Badges · time · pay" subtitle="Status pills, J-12 time chips, the 💳 payment hint, sponsored cue" -->
<!DOCTYPE html>
<html lang="fr"><head><meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 24px; background: var(--surface-card); display: flex; flex-direction: column; gap: 16px; }
  .row { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
  .h { font: var(--label-caps); letter-spacing: var(--tracking-caps); text-transform: uppercase; color: var(--text-faint); width: 60px; }
</style></head>
<body>
  <div class="row">
    <span class="h">Status</span>
    <span class="ts-badge ts-badge--done">Fait</span>
    <span class="ts-badge ts-badge--current">À faire</span>
    <span class="ts-badge ts-badge--waiting">En attente</span>
    <span class="ts-badge ts-badge--locked">Verrouillé</span>
    <span class="ts-badge ts-badge--overdue">En retard</span>
    <span class="ts-badge ts-badge--author">Auteur</span>
  </div>
  <div class="row">
    <span class="h">Temps</span>
    <span class="ts-time">~2 semaines</span>
    <span class="ts-time ts-time--soon">J-12</span>
    <span class="ts-time ts-time--late">Retard 3 j</span>
    <span class="ts-tag">Notaire</span>
    <span class="ts-tag">Immobilier</span>
  </div>
  <div class="row">
    <span class="h">Argent</span>
    <span class="ts-pay">💳 Estimation <b>~1 200 €</b></span>
    <span class="ts-rating"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2l3.1 6.3 6.9 1-5 4.9 1.2 6.8L12 17.8 5.8 21l1.2-6.8-5-4.9 6.9-1z"/></svg>4,8 <span>· 213 avis</span></span>
    <span class="ts-sponsored">Suggéré</span>
  </div>
</body></html>

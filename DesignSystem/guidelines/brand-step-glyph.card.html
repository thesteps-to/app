<!-- @dsCard group="Brand" viewport="700x200" name="Step glyph — the six states" subtitle="Circle-based waypoint. Closer to a trail blaze than to BPMN. No padlocks, no diamonds." -->
<!DOCTYPE html>
<html lang="fr"><head><meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 26px; background: var(--surface-card); }
  .row { display: flex; gap: 28px; align-items: flex-start; justify-content: space-between; }
  .cell { display: flex; flex-direction: column; align-items: center; gap: 10px; text-align: center; max-width: 116px; }
  .name { font: var(--font-ui); font-weight: var(--weight-semibold); font-size: 13px; color: var(--text-strong); }
  .desc { font: var(--font-caption); font-size: 10px; color: var(--text-muted); line-height: 1.35; }
</style></head>
<body>
  <div class="row">
    <div class="cell">
      <svg width="48" height="48" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10" fill="#16a34a"/><path d="M7.5 12.3l3 3 6-6.2" fill="none" stroke="#fff" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg>
      <span class="name">done</span><span class="desc">terminé, vert calme</span>
    </div>
    <div class="cell">
      <svg width="56" height="56" viewBox="0 0 24 24"><circle cx="12" cy="12" r="11" fill="#2563eb" fill-opacity=".14"/><circle cx="12" cy="12" r="8.5" fill="#2563eb"/><circle cx="12" cy="12" r="3.4" fill="#fff"/></svg>
      <span class="name">current</span><span class="desc">à faire maintenant — le seul état « fort »</span>
    </div>
    <div class="cell">
      <svg width="48" height="48" viewBox="0 0 24 24"><circle cx="12" cy="12" r="9" fill="#eaeef2" stroke="#bcc6d0" stroke-width="2"/><circle cx="12" cy="12" r="2.2" fill="#97a4b1"/></svg>
      <span class="name">locked</span><span class="desc">présent, jamais caché — anneau discret</span>
    </div>
    <div class="cell">
      <svg width="48" height="48" viewBox="0 0 24 24"><circle cx="12" cy="12" r="9" fill="#fff8eb" stroke="#e0900c" stroke-width="2"/><path d="M12 8v4.2l2.6 1.6" fill="none" stroke="#e0900c" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
      <span class="name">waiting</span><span class="desc">en attente d’un tiers — « pas à vous de jouer »</span>
    </div>
    <div class="cell">
      <svg width="48" height="48" viewBox="0 0 24 24"><circle cx="12" cy="12" r="9" fill="#fef2f2" stroke="#e24545" stroke-width="2"/><path d="M12 7.6v5.2" fill="none" stroke="#e24545" stroke-width="2.2" stroke-linecap="round"/><circle cx="12" cy="16.2" r="1.3" fill="#e24545"/></svg>
      <span class="name">overdue</span><span class="desc">retard réel, actionnable — rare</span>
    </div>
  </div>
</body></html>

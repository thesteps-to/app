<!-- @dsCard group="Colors" viewport="700x172" name="Neutrals (cool slate)" subtitle="The quiet canvas — backgrounds, text, borders" -->
<!DOCTYPE html>
<html lang="fr"><head><meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 22px; background: var(--surface-card); }
  .row { display: flex; gap: 0; border-radius: var(--radius-md); overflow: hidden; box-shadow: var(--shadow-xs); }
  .sw { flex: 1; height: 64px; display: flex; align-items: flex-end; padding: 6px 7px; }
  .sw span { font: var(--font-caption); font-size: 10px; }
  .sw.light span { color: var(--gray-700); }
  .sw.dk span { color: #fff; opacity: .85; }
  .legend { display: flex; gap: 14px; margin-top: 14px; flex-wrap: wrap; }
  .chip { font: var(--font-caption); font-size: 11px; color: var(--text-muted); }
  .chip b { color: var(--text-strong); }
</style></head>
<body>
  <div class="row">
    <div class="sw light" style="background:var(--gray-0);box-shadow:inset 0 0 0 1px var(--gray-150)"><span>0</span></div>
    <div class="sw light" style="background:var(--gray-50)"><span>50</span></div>
    <div class="sw light" style="background:var(--gray-100)"><span>100</span></div>
    <div class="sw light" style="background:var(--gray-200)"><span>200</span></div>
    <div class="sw light" style="background:var(--gray-300)"><span>300</span></div>
    <div class="sw dk" style="background:var(--gray-400)"><span>400</span></div>
    <div class="sw dk" style="background:var(--gray-500)"><span>500</span></div>
    <div class="sw dk" style="background:var(--gray-600)"><span>600</span></div>
    <div class="sw dk" style="background:var(--gray-700)"><span>700</span></div>
    <div class="sw dk" style="background:var(--gray-800)"><span>800</span></div>
    <div class="sw dk" style="background:var(--gray-900)"><span>900</span></div>
    <div class="sw dk" style="background:var(--gray-950)"><span>950</span></div>
  </div>
  <div class="legend">
    <span class="chip">app bg <b>--surface-app</b> 50</span>
    <span class="chip">card <b>--surface-card</b> 0</span>
    <span class="chip">body text <b>--text-body</b> 700</span>
    <span class="chip">heading <b>--text-strong</b> 900</span>
    <span class="chip">hairline <b>--border-subtle</b> 150</span>
  </div>
</body></html>

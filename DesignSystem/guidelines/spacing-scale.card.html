<!-- @dsCard group="Spacing" viewport="700x150" name="Spacing scale" subtitle="4px grid — the app leans on the large end (whitespace lowers heart rate)" -->
<!DOCTYPE html>
<html lang="fr"><head><meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 24px; background: var(--surface-card); display: flex; align-items: flex-end; gap: 16px; flex-wrap: wrap; }
  .tok { display: flex; flex-direction: column; gap: 8px; align-items: center; }
  .bar { background: var(--brand-soft); border: 1px solid var(--brand-soft-bd); border-radius: var(--radius-xs); }
  .lbl { font: var(--font-caption); font-size: 10px; color: var(--text-muted); }
  .lbl b { color: var(--text-strong); display: block; font-weight: 600; }
</style></head>
<body>
  <div class="tok"><div class="bar" style="width:4px;height:4px"></div><span class="lbl"><b>2xs</b>4</span></div>
  <div class="tok"><div class="bar" style="width:8px;height:8px"></div><span class="lbl"><b>xs</b>8</span></div>
  <div class="tok"><div class="bar" style="width:12px;height:12px"></div><span class="lbl"><b>sm</b>12</span></div>
  <div class="tok"><div class="bar" style="width:16px;height:16px"></div><span class="lbl"><b>md</b>16</span></div>
  <div class="tok"><div class="bar" style="width:24px;height:24px"></div><span class="lbl"><b>lg</b>24</span></div>
  <div class="tok"><div class="bar" style="width:32px;height:32px"></div><span class="lbl"><b>xl</b>32</span></div>
  <div class="tok"><div class="bar" style="width:48px;height:48px"></div><span class="lbl"><b>2xl</b>48</span></div>
  <div class="tok"><div class="bar" style="width:64px;height:64px"></div><span class="lbl"><b>3xl</b>64</span></div>
</body></html>
